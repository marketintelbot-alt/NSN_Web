services:
  - type: web
    name: north-shore-nautical-api
    runtime: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: BUSINESS_NOTIFICATION_EMAIL
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: ADMIN_SESSION_TTL_HOURS
        value: "12"
    buildFilter:
      paths:
        - backend/**
        - render.yaml

  - type: web
    name: north-shore-nautical-site
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    domains:
      - nsnautical.com
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SITE_URL
        sync: false
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: cron
    name: north-shore-nautical-reminders
    runtime: node
    plan: starter
    region: ohio
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run reminders
    schedule: "*/15 * * * *"
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: BUSINESS_NOTIFICATION_EMAIL
        sync: false
      - key: BUSINESS_NOTIFICATION_EMAILS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: ADMIN_SESSION_TTL_HOURS
        value: "12"
    buildFilter:
      paths:
        - backend/**
        - render.yaml
